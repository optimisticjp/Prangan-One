name: CI

on:
  push:
  pull_request:

jobs:
  app:
    name: Type check, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
      - name: Production build
        run: npm run build

  browser-smoke:
    name: Browser smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/playwright/
          retention-days: 7

  isolation:
    name: Database isolation suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U postgres; do sleep 1; done
        env:
          PGPASSWORD: postgres
      - name: Run the isolation test suite
        working-directory: supabase/tests
        run: ./run-isolation-tests.sh
        env:
          # The script's own psql calls never specify a host, which is
          # correct and necessary everywhere else this script runs
          # (including this whole project's own sandbox verification
          # process) - psql defaults to a local Unix socket connection
          # when no host is given, which only exists when Postgres is a
          # local process on the same filesystem. GitHub Actions' own
          # postgres service runs as a separate, sibling container,
          # reachable only over TCP - PGHOST here is what makes psql
          # actually connect that way, specifically for this one step,
          # without needing to change the script at all.
          PGHOST: localhost
          PGPASSWORD: postgres
