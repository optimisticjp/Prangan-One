name: CI

on:
  push:
  pull_request:

jobs:
  app:
    name: Type check, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
      - name: Production build
        run: npm run build

  isolation:
    name: Database isolation suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U postgres; do sleep 1; done
        env:
          PGPASSWORD: postgres
      - name: Run the isolation test suite
        working-directory: supabase/tests
        run: ./run-isolation-tests.sh
